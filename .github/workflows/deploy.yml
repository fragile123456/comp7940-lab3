name: AWS EC2 Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest   # must be ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.EC2_KEY }}

      - name: Deploy application
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          # 核心路径适配：EC2 端目标目录与本地项目名对齐
          cd ~/comp7940-lab
          git pull origin main
          # Restart chatbot inside venv（路径与项目目录对齐）
          pkill -f "python comp7940-lab/chatbot.py" || true
          nohup ~/comp7940-lab/venv/bin/python ~/comp7940-lab/chatbot.py > ~/comp7940-lab/app.log 2>&1 &
          EOF