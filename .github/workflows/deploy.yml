name: AWS EC2 Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.EC2_KEY }}

      - name: Deploy application to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          # 1. 先安装git（EC2默认可能没有）
          if ! command -v git &> /dev/null; then
            sudo dnf install -y git || sudo apt-get install -y git
          fi

          # 2. 检查项目目录是否存在，不存在则克隆（用你的真实仓库地址）
          if [ ! -d "~/chatbot_comp7940" ]; then
            git clone https://github.com/fragile123456/comp7940-lab3.git ~/chatbot_comp7940
          fi

          # 3. 进入目录并拉取最新代码
          cd ~/chatbot_comp7940 || exit 1  # 进入失败则直接退出，避免后续报错
          git pull origin main

          # 4. 检查虚拟环境是否存在，不存在则创建（首次部署必备）
          if [ ! -d "venv" ]; then
            sudo dnf install -y python3 python3-venv || sudo apt-get install -y python3 python3-venv
            python3 -m venv venv
          fi

          # 5. 重启应用（先杀旧进程，再启动新进程）
          pkill -f "python chatbot.py" || true  # 没进程就忽略错误
          nohup ./venv/bin/python chatbot.py > app.log 2>&1 &

          # 6. 输出日志确认启动成功（方便排查）
          sleep 2
          tail -n 10 app.log
          EOF